name: iOS Build (unsigned IPA)

# Builds an unsigned iOS IPA from Unity on GitHub Actions macOS runner.
# Download the IPA artifact and sideload with AltStore/Sideloadly on Windows.
# No Mac required. Free Apple ID works (7-day expiry, 3-app limit).
#
# Prerequisites (one-time setup):
#   1. Generate a Unity activation file:
#      - Run the "Acquire Unity activation file (.alf)" workflow once
#      - Download the .alf artifact
#      - Upload to https://license.unity3d.com/manual
#      - Download the resulting .ulf file
#      - Copy contents to GitHub secret UNITY_LICENSE
#   2. Add secrets in repo Settings → Secrets and variables → Actions:
#      - UNITY_LICENSE: the entire contents of the .ulf file (XML)
#      - UNITY_EMAIL: your Unity account email
#      - UNITY_PASSWORD: your Unity account password
#
# To trigger a build:
#   - Click the "Run workflow" button on this workflow page
#   - Wait ~30-60 min for first build (caching speeds up future builds to ~10-15 min)
#   - Download the "YandereSimulator-iOS-unsigned-ipa" artifact
#   - Sideload with AltStore or Sideloadly
on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unity iOS → Xcode → unsigned IPA
    runs-on: macos-14

    steps:
      # =====================================================================
      # 1. Checkout code (skip bulk LFS to stay within bandwidth limits)
      # =====================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      # =====================================================================
      # 2. Download project zip (Assets + ProjectSettings + UserSettings)
      #    from GitHub Release. Created with: tar -acf Assets.zip Assets ProjectSettings UserSettings
      # =====================================================================
      - name: Download and extract project data
        run: |
          set -e
          curl -sSL -o Assets.zip https://github.com/ALX-githb/ysim2/releases/download/v1.0-assets/Assets.zip
          ls -lh Assets.zip
          unzip -q -o Assets.zip
          echo "Assets:"; du -sh Assets
          echo "ProjectSettings:"; ls ProjectSettings | head -n 5
          rm Assets.zip
          # Restore only .cs scripts (never LFS, always regular git objects).
          # Do NOT restore .meta files — they are still LFS objects in git
          # and would be written as pointer text, breaking Unity.
          find Assets/Scripts -name "*.cs" -print0 | xargs -0 git checkout -- 2>/dev/null || true

          # Restore only the specific scene/material/settings files that were
          # migrated out of LFS. All other scenes/materials stay from the zip.
          git checkout -- \
            "Assets/Scenes/CalendarScene.unity" \
            "Assets/Scenes/ChoiceScene.unity" \
            "Assets/Scenes/HomeScene.unity" \
            "Assets/Material/BlipMaterial.mat" \
            "Assets/Material/Blood_Splatter.mat" \
            "Assets/Material/SelectiveGrayscale.mat" \
            "Assets/Material/Window_Glass_Mat.mat" \
            "ProjectSettings/ProjectSettings.asset" \
            "ProjectSettings/QualitySettings.asset" \
            || true

      # =====================================================================
      # 2b. Strip packages that need CocoaPods native frameworks
      #     (Ads, Purchasing, Analytics) — no game scripts reference them.
      #     This avoids linker errors for missing UnityAds.framework etc.
      # =====================================================================
      - name: Strip ads/purchasing/analytics packages
        run: |
          set -e
          python3 -c "
          import json, pathlib
          p = pathlib.Path('Packages/manifest.json')
          m = json.loads(p.read_text())
          for pkg in ['com.unity.ads', 'com.unity.purchasing', 'com.unity.analytics']:
            m['dependencies'].pop(pkg, None)
            print(f'Removed {pkg}')
          p.write_text(json.dumps(m, indent=2) + '\n')
          "
          echo "Remaining packages:"
          cat Packages/manifest.json | head -n 20

      # =====================================================================
      # 3. Cache Unity Library folder
      #    Key includes hashes of Assets, Packages, ProjectSettings
      #    so cache invalidates when those change. Restore-keys allow
      #    partial matches when exact key misses.
      # =====================================================================
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      # =====================================================================
      # 4. Build Unity iOS Xcode project
      #    Unity Personal: UNITY_LICENSE = .ulf file contents (XML).
      # =====================================================================
      - name: Build Unity iOS Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.4.0f1
          targetPlatform: iOS
          buildName: YandereSimulator
          allowDirtyBuild: true
          versioning: None

      # =====================================================================
      # 5. Show what GameCI produced (always runs so we can debug)
      # =====================================================================
      - name: List build output
        if: always()
        run: |
          echo "==== Top-level ===="
          ls -la
          echo "==== build/ (recursive, 3 levels) ===="
          find build -maxdepth 3 -type d 2>/dev/null || true
          echo "==== Searching for any .xcodeproj ===="
          find . -name "*.xcodeproj" -type d 2>/dev/null || true

      # =====================================================================
      # 6a. Install CocoaPods dependencies
      #     Unity Ads / Purchasing / Analytics generate a Podfile that needs
      #     to be installed before xcodebuild can link their frameworks.
      # =====================================================================
      - name: Run pod install
        run: |
          set -e

          XCODEPROJ=$(find build -name "Unity-iPhone.xcodeproj" -type d 2>/dev/null | head -n 1)
          if [ -z "${XCODEPROJ}" ]; then
            echo "ERROR: No Unity-iPhone.xcodeproj found"
            exit 1
          fi
          PROJECT_DIR=$(dirname "${XCODEPROJ}")
          echo "Project dir: ${PROJECT_DIR}"

          if [ -f "${PROJECT_DIR}/Podfile" ]; then
            echo "==== Found Podfile, running pod install ===="
            cd "${PROJECT_DIR}"
            pod install --repo-update
          else
            echo "No Podfile found — skipping pod install"
          fi

      # =====================================================================
      # 6b. Compile the Xcode workspace (with Pods) → unsigned .app
      # =====================================================================
      - name: Build .app with xcodebuild (unsigned)
        run: |
          set -e

          # Prefer .xcworkspace (created by pod install) over .xcodeproj
          XCWORKSPACE=$(find build -name "Unity-iPhone.xcworkspace" -type d 2>/dev/null | head -n 1)
          XCODEPROJ=$(find build -name "Unity-iPhone.xcodeproj" -type d 2>/dev/null | head -n 1)

          mkdir -p build_output

          if [ -n "${XCWORKSPACE}" ]; then
            echo "Building workspace: ${XCWORKSPACE}"
            xcodebuild \
              -workspace "${XCWORKSPACE}" \
              -scheme Unity-iPhone \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build_output \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              PROVISIONING_PROFILE="" \
              DEVELOPMENT_TEAM="" \
              ONLY_ACTIVE_ARCH=NO \
              build
          elif [ -n "${XCODEPROJ}" ]; then
            echo "Building project (no workspace): ${XCODEPROJ}"
            xcodebuild \
              -project "${XCODEPROJ}" \
              -scheme Unity-iPhone \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build_output \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              PROVISIONING_PROFILE="" \
              DEVELOPMENT_TEAM="" \
              ONLY_ACTIVE_ARCH=NO \
              build
          else
            echo "ERROR: No Xcode project or workspace found"
            find build -maxdepth 5 2>/dev/null || true
            exit 1
          fi

      # =====================================================================
      # 7. Wrap the .app into an unsigned .ipa
      #    .ipa = a zip with Payload/<App>.app inside
      #
      # IMPORTANT: Strip ALL _CodeSignature folders (including nested ones in
      # UnityFramework.framework and UnityRuntime.framework) so that
      # sideloaders (AltStore/Sideloadly) re-sign everything cleanly with
      # the user's free Apple ID cert. Otherwise iOS rejects with
      # 0xe8008017 "A signed resource has been added, modified, or deleted."
      # =====================================================================
      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH=$(find build_output/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "${APP_PATH}" ]; then
            echo "ERROR: No .app produced by xcodebuild"
            find build_output -name "*.app" || true
            exit 1
          fi

          echo "Found .app: ${APP_PATH}"

          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/

          echo "==== Stripping nested _CodeSignature folders ===="
          find Payload -type d -name "_CodeSignature" -print -exec rm -rf {} + 2>/dev/null || true

          echo "==== Removing any embedded.mobileprovision (none expected) ===="
          find Payload -type f -name "embedded.mobileprovision" -print -delete 2>/dev/null || true

          echo "==== Final .app contents ===="
          find Payload -maxdepth 4 -type d

          zip -qr YandereSimulator-unsigned.ipa Payload
          rm -rf Payload

          ls -lh YandereSimulator-unsigned.ipa

      # =====================================================================
      # 8. Upload as a downloadable artifact
      # =====================================================================
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: YandereSimulator-iOS-unsigned-ipa
          path: YandereSimulator-unsigned.ipa
          retention-days: 7
