name: Acquire Unity activation file (.alf)

# Run this ONE-TIME workflow to generate a Unity activation file (.alf)
# that you can use to get a .ulf license file for the UNITY_LICENSE secret.
#
# Steps:
#   1. Run this workflow (Actions tab → Acquire Unity activation file → Run workflow)
#   2. Download the "unity-activation-file" artifact
#   3. Upload the .alf file to https://license.unity3d.com/manual
#   4. Pick "Unity Personal Edition" → Download the resulting .ulf file
#   5. Open the .ulf file in a text editor, copy ENTIRE contents
#   6. Paste into GitHub secret UNITY_LICENSE
#
# After this, you can disable or delete this workflow.
on:
  workflow_dispatch:

jobs:
  request-activation-file:
    name: Request Unity activation file
    # Use the official GameCI Unity Docker image which has Unity preinstalled.
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.0f1-base-3
      options: --user root

    steps:
      - name: Generate Unity activation file
        run: |
          set +e
          # Unity exits non-zero after creating the .alf file — that's expected
          /opt/unity/Editor/Unity \
            -batchmode \
            -nographics \
            -logFile /dev/stdout \
            -createManualActivationFile \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD"

          echo "==== Looking for .alf file ===="
          ALF_FILE=$(find . /root /home -name "Unity_v*.alf" 2>/dev/null | head -n 1)

          if [ -z "$ALF_FILE" ]; then
            echo "ERROR: no .alf file produced"
            exit 1
          fi

          echo "Found: $ALF_FILE"
          mkdir -p /tmp/alf
          cp "$ALF_FILE" /tmp/alf/
          ls -la /tmp/alf/
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload activation file artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: /tmp/alf/*.alf
          retention-days: 7
